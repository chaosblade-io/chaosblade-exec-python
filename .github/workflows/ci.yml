name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.9", "3.10", "3.11", "3.12", "3.13" ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Display environment info
        run: |
          python --version
          pip --version

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev,test]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Run tests with coverage
        run: pytest tests/ --cov=chaosblade --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.12' && success()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Check License Header
        uses: korandoru/hawkeye@v6

      - name: Install build tools
        run: pip install build hatchling

      - name: Build full product (build-target layout)
        run: |
          make clean
          make build BLADE_VERSION=1.8.0
          test -f build-target/chaosblade-1.8.0/yaml/chaosblade-python-spec-1.8.0.yaml
          test -d build-target/chaosblade-1.8.0/lib/python/chaosblade
          echo "build-target layout verified"

      - name: Build wheel
        run: python -m build --wheel

      - name: Verify wheel
        run: |
          pip install dist/*.whl
          python -c "import chaosblade; print(f'Version: {chaosblade.__version__}')"
          chaosblade-exec-python --version

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: chaosblade-exec-python-wheel
          path: dist/*.whl
          retention-days: 30
